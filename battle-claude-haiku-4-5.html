<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonial Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Testimonial Card -->
        <div class="bg-white rounded-2xl shadow-lg hover:shadow-xl transition-shadow duration-300 p-8">
            <!-- Star Rating -->
            <div class="flex gap-1.5 mb-5">
                <svg class="w-5 h-5 text-amber-400 fill-current" viewBox="0 0 20 20">
                    <path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/>
                </svg>
                <svg class="w-5 h-5 text-amber-400 fill-current" viewBox="0 0 20 20">
                    <path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/>
                </svg>
                <svg class="w-5 h-5 text-amber-400 fill-current" viewBox="0 0 20 20">
                    <path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/>
                </svg>
                <svg class="w-5 h-5 text-amber-400 fill-current" viewBox="0 0 20 20">
                    <path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/>
                </svg>
                <svg class="w-5 h-5 text-amber-400 fill-current" viewBox="0 0 20 20">
                    <path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/>
                </svg>
            </div>

            <!-- Testimonial Text -->
            <p class="text-gray-700 text-base leading-relaxed mb-8 font-light">
                "This product completely transformed the way I work. The attention to detail and user experience is exceptional. I couldn't recommend it more highly to anyone looking for quality and reliability."
            </p>

            <!-- Divider -->
            <div class="h-px bg-gray-200 mb-6"></div>

            <!-- Author Section -->
            <div class="flex items-center gap-4">
                <!-- Avatar -->
                <div class="flex-shrink-0">
                    <img 
                        src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop" 
                        alt="Sarah Anderson" 
                        class="w-12 h-12 rounded-full object-cover border-2 border-slate-100"
                    >
                </div>

                <!-- Author Info -->
                <div class="flex-1 min-w-0">
                    <h3 class="text-gray-900 font-semibold text-sm">Sarah Anderson</h3>
                    <p class="text-gray-500 text-xs">Product Manager, Tech Innovations</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
