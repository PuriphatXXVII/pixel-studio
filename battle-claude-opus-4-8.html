<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonial Card</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 to-slate-200 p-6">

  <figure class="relative max-w-md w-full bg-white rounded-2xl shadow-xl ring-1 ring-slate-900/5 p-8">
    <!-- Decorative quote mark -->
    <svg class="absolute top-6 right-8 w-12 h-12 text-indigo-100" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">

    </svg>

    <!-- Star rating -->
    <div class="flex items-center gap-1 mb-5" aria-label="Rated 5 out of 5 stars">
      <svg class="w-5 h-5 text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.05 2.93c.3-.92 1.6-.92 1.9 0l1.4 4.32a1 1 0 00.95.69h4.55c.97 0 1.37 1.24.59 1.81l-3.68 2.67a1 1 0 00-.36 1.12l1.4 4.32c.3.92-.75 1.69-1.54 1.12l-3.68-2.67a1 1 0 00-1.18 0l-3.68 2.67c-.78.57-1.83-.2-1.53-1.12l1.4-4.32a1 1 0 00-.36-1.12L1.5 9.75c-.78-.57-.38-1.81.59-1.81h4.55a1 1 0 00.95-.69l1.4-4.32z"/></svg>
      <svg class="w-5 h-5 text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.05 2.93c.3-.92 1.6-.92 1.9 0l1.4 4.32a1 1 0 00.95.69h4.55c.97 0 1.37 1.24.59 1.81l-3.68 2.67a1 1 0 00-.36 1.12l1.4 4.32c.3.92-.75 1.69-1.54 1.12l-3.68-2.67a1 1 0 00-1.18 0l-3.68 2.67c-.78.57-1.83-.2-1.53-1.12l1.4-4.32a1 1 0 00-.36-1.12L1.5 9.75c-.78-.57-.38-1.81.59-1.81h4.55a1 1 0 00.95-.69l1.4-4.32z"/></svg>
      <svg class="w-5 h-5 text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.05 2.93c.3-.92 1.6-.92 1.9 0l1.4 4.32a1 1 0 00.95.69h4.55c.97 0 1.37 1.24.59 1.81l-3.68 2.67a1 1 0 00-.36 1.12l1.4 4.32c.3.92-.75 1.69-1.54 1.12l-3.68-2.67a1 1 0 00-1.18 0l-3.68 2.67c-.78.57-1.83-.2-1.53-1.12l1.4-4.32a1 1 0 00-.36-1.12L1.5 9.75c-.78-.57-.38-1.81.59-1.81h4.55a1 1 0 00.95-.69l1.4-4.32z"/></svg>
      <svg class="w-5 h-5 text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.05 2.93c.3-.92 1.6-.92 1.9 0l1.4 4.32a1 1 0 00.95.69h4.55c.97 0 1.37 1.24.59 1.81l-3.68 2.67a1 1 0 00-.36 1.12l1.4 4.32c.3.92-.75 1.69-1.54 1.12l-3.68-2.67a1 1 0 00-1.18 0l-3.68 2.67c-.78.57-1.83-.2-1.53-1.12l1.4-4.32a1 1 0 00-.36-1.12L1.5 9.75c-.78-.57-.38-1.81.59-1.81h4.55a1 1 0 00.95-.69l1.4-4.32z"/></svg>

      <span class="ml-2 text-sm font-medium text-slate-500">5.0</span>
    </div>

    <!-- Quote -->
    <blockquote class="text-slate-700 text-lg leading-relaxed">
      “This product completely transformed how our team works. The attention to detail and the support we received were second to none. I can't recommend it enough.”
    </blockquote>

    <!-- Author -->
    <figcaption class="mt-6 flex items-center gap-4 pt-6 border-t border-slate-100">
      <img class="w-12 h-12 rounded-full object-cover ring-2 ring-white shadow"
           src="https://i.pravatar.cc/96?img=47" alt="Sarah Mitchell">
      <div>
        <div class="font-semibold text-slate-900">Sarah Mitchell</div>
        <div class="text-sm text-slate-500">Product Designer, Lumen Co.</div>
      </div>
    </figcaption>
  </figure>

</html>
