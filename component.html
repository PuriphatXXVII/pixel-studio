<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassy Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* Custom themed checkbox */
  .glass-check {
    appearance: none;
    -webkit-appearance: none;
    width: 1.2rem;
    height: 1.2rem;
    border-radius: 0.4rem;
    border: 1.5px solid rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.18);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.25);
    backdrop-filter: blur(6px);
    cursor: pointer;
    position: relative;
    transition: all .2s ease;
  }
  .glass-check:hover { border-color: rgba(255,255,255,0.95); background: rgba(255,255,255,0.28); }
  .glass-check:checked {
    background: rgba(255,255,255,0.98);
    border-color: rgba(255,255,255,0.98);
  }
  .glass-check:checked::after {
    content: "";
    position: absolute;
    left: 0.4rem;
    top: 0.16rem;
    width: 0.32rem;
    height: 0.62rem;
    border: solid #4338ca;
    border-width: 0 2.5px 2.5px 0;
    transform: rotate(45deg);
  }
  .glass-check:focus-visible {
    outline: 2px solid rgba(255,255,255,0.85);
    outline-offset: 2px;
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-indigo-700 via-purple-600 to-pink-500 relative overflow-hidden">

  <!-- decorative blobs -->
  <div class="absolute top-0 left-0 w-80 h-80 bg-pink-400/50 rounded-full blur-3xl animate-pulse"></div>
  <div class="absolute bottom-0 right-0 w-96 h-96 bg-indigo-400/50 rounded-full blur-3xl"></div>
  <div class="absolute top-1/2 left-1/3 w-72 h-72 bg-fuchsia-300/30 rounded-full blur-3xl"></div>

  <div class="relative w-full max-w-md">
    <!-- subtle highlight ring -->
    <div class="absolute -inset-px rounded-[1.7rem] bg-gradient-to-b from-white/50 to-white/5 opacity-70 blur-[1px]"></div>

    <div class="relative backdrop-blur-2xl bg-white/[0.12] border border-white/40 rounded-[1.7rem] shadow-[0_8px_50px_rgba(0,0,0,0.4)] p-8 sm:p-10
                ring-1 ring-inset ring-white/20">

      <!-- top edge gloss -->
      <div class="absolute inset-x-6 top-0 h-px bg-gradient-to-r from-transparent via-white/60 to-transparent"></div>

      <!-- header -->
      <div class="text-center mb-9">
        <div class="mx-auto mb-6 w-16 h-16 rounded-2xl bg-white/95 shadow-lg flex items-center justify-center ring-1 ring-white/70">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-indigo-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white drop-shadow-sm">Welcome back</h1>
        <p class="text-white/95 text-sm mt-2 drop-shadow-sm">Sign in to continue to your account</p>
      </div>

      <!-- form -->
      <form class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-white mb-2">Email</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-white/80">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </span>
            <input type="email" placeholder="you@example.com"
              class="w-full pl-11 pr-4 py-3 rounded-xl bg-white/20 border border-white/40 text-white placeholder-white/80 focus:outline-none focus:ring-2 focus:ring-white/90 focus:border-transparent focus:bg-white/25 transition">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-white mb-2">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-white/80">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </span>
            <input type="password" placeholder="••••••••"
              class="w-full pl-11 pr-4 py-3 rounded-xl bg-white/20 border border-white/40 text-white placeholder-white/80 focus:outline-none focus:ring-2 focus:ring-white/90 focus:border-transparent focus:bg-white/25 transition">
          </div>
        </div>

        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2.5 text-white/90 cursor-pointer select-none">
            <input type="checkbox" class="glass-check">
            Remember me
          </label>
          <a href="#" class="text-white hover:underline font-medium">Forgot password?</a>
        </div>

        <button type="submit"
          class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 via-purple-600 to-fuchsia-600 text-white font-semibold shadow-lg ring-1 ring-white/30 hover:from-indigo-500 hover:via-purple-500 hover:to-fuchsia-500 hover:shadow-xl active:scale-[0.99] transition transform">
          Sign in
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-white/30">
        <p class="text-center text-sm text-white/90">
          Don't have an account?
          <a href="#" class="text-white font-semibold hover:underline ml-1">Sign up</a>
        </p>
      </div>
    </div>
  </div>

</body>
</html>
